<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi panel · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Darts Manager</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <div class="text-white small text-end">
          <div id="user-name" class="fw-semibold">...</div>
          <div id="user-role" class="opacity-75">Usuario</div>
        </div>
        <button type="button" class="btn btn-outline-light btn-sm" id="logout-btn">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div id="page-alert" class="alert d-none" role="alert"></div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body p-4">
            <h1 class="h4 mb-2">Torneos</h1>
            <p class="text-muted small">Consulta torneos activos y finalizados.</p>
            <div id="tournaments-list">
              <p class="text-muted mb-0">Cargando...</p>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h4 mb-2">Ranking de jugadores</h2>
            <p class="text-muted small">Estadísticas globales de los jugadores activos.</p>
            <div id="global-stats">
              <p class="text-muted mb-0">Cargando...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/pages/user-dashboard.js"></script>
</body>
</html>
