<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torneo · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Darts Manager</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <button type="button" class="btn btn-outline-light btn-sm" id="logout-btn">Salir</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <a href="index.html" class="small text-decoration-none">← Volver al panel</a>
    <div class="d-flex align-items-center gap-2 mt-2 mb-4">
      <h1 class="h4 mb-0" id="tournament-title">Torneo</h1>
      <span class="badge" id="tournament-status-badge">...</span>
    </div>

    <div id="page-alert" class="alert d-none" role="alert"></div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white"><h2 class="h6 mb-0">Clasificación</h2></div>
          <div class="card-body" id="standings-container">Cargando...</div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card shadow-sm border-0" id="matches-card">
          <div class="card-header bg-white"><h2 class="h6 mb-0">Enfrentamientos</h2></div>
          <div class="card-body" id="matches-container">Cargando...</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/pages/user-tournament.js"></script>
</body>
</html>
