<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-light auth-page">
  <main class="container">
    <div class="row justify-content-center min-vh-100 align-items-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <h1 class="h3 fw-semibold">Darts Manager</h1>
          <p class="text-muted mb-0">Gestión de torneos de dardos</p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h5 mb-4">Iniciar sesión</h2>

            <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

            <form id="login-form" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required autocomplete="username">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary w-100" id="login-submit">Entrar</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
