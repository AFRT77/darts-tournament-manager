<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jugadores · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Darts Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#admin-nav" aria-controls="admin-nav" aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="admin-nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link active" href="players.html">Jugadores</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tournaments.html">Torneos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="index.html">Usuarios</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3 py-2 py-lg-0">
          <div class="text-white small text-end">
            <div id="user-name" class="fw-semibold">...</div>
            <div class="opacity-75">Administrador</div>
          </div>
          <button type="button" class="btn btn-outline-light btn-sm" id="logout-btn">Salir</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="h4 mb-1">Jugadores</h1>
        <p class="text-muted mb-0">Alta, edición y baja lógica de jugadores.</p>
      </div>
      <button type="button" class="btn btn-primary" id="new-player-btn">Nuevo jugador</button>
    </div>

    <div id="players-alert" class="alert d-none" role="alert"></div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label" for="search-input">Buscar</label>
            <input type="search" class="form-control" id="search-input" placeholder="Nombre o apodo">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="active-filter">Estado</label>
            <select class="form-select" id="active-filter">
              <option value="all">Todos</option>
              <option value="true" selected>Activos</option>
              <option value="false">Inactivos</option>
            </select>
          </div>
          <div class="col-md-3">
            <button type="button" class="btn btn-outline-secondary w-100" id="refresh-btn">Actualizar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm border-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead class="table-light">
            <tr>
              <th>Jugador</th>
              <th>Puntos</th>
              <th>Estado</th>
              <th>Alta</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="players-table-body">
            <tr>
              <td colspan="5" class="text-center text-muted py-4">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer bg-white">
        <span class="small text-muted" id="pagination-info">...</span>
      </div>
    </div>
  </main>

  <div class="modal fade" id="player-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="player-form">
          <div class="modal-header">
            <h2 class="modal-title h5" id="player-modal-title">Nuevo jugador</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="player-id">
            <div class="mb-3">
              <label class="form-label" for="player-name">Nombre</label>
              <input class="form-control" id="player-name" name="name" type="text" required minlength="2">
            </div>
            <div class="mb-3">
              <label class="form-label" for="player-nickname">Apodo</label>
              <input class="form-control" id="player-nickname" name="nickname" type="text">
            </div>
            <div class="mb-3">
              <label class="form-label" for="player-points">Puntos de ranking</label>
              <input class="form-control" id="player-points" name="rankingPoints" type="number" min="0" value="0">
            </div>
            <div class="form-check d-none" id="active-field">
              <input class="form-check-input" type="checkbox" id="player-active" name="active" checked>
              <label class="form-check-label" for="player-active">Jugador activo</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="save-player-btn">Crear jugador</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/pages/players-admin.js"></script>
</body>
</html>
