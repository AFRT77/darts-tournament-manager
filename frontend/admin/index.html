<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel admin · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Darts Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#admin-nav" aria-controls="admin-nav" aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="admin-nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="players.html">Jugadores</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tournaments.html">Torneos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Usuarios</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-3 py-2 py-lg-0">
          <div class="text-white small text-end">
            <div id="user-name" class="fw-semibold">...</div>
            <div id="user-role" class="opacity-75">Administrador</div>
          </div>
          <button type="button" class="btn btn-outline-light btn-sm" id="logout-btn">Salir</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="container py-4">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0 h-100">
          <div class="card-body p-4">
            <h1 class="h4 mb-2">Panel de administración</h1>
            <p class="text-muted">Gestiona torneos, jugadores y resultados desde aquí.</p>
            <div class="d-flex flex-wrap gap-2 mt-3">
              <a class="btn btn-sm btn-primary" href="players.html">Gestionar jugadores</a>
              <a class="btn btn-sm btn-primary" href="tournaments.html">Gestionar torneos</a>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h5 mb-3">Registrar usuario</h2>
            <div id="register-alert" class="alert d-none" role="alert"></div>
            <form id="register-form">
              <div class="mb-3">
                <label class="form-label" for="displayName">Nombre</label>
                <input class="form-control" id="displayName" name="displayName" type="text">
              </div>
              <div class="mb-3">
                <label class="form-label" for="register-email">Email</label>
                <input class="form-control" id="register-email" name="email" type="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="register-password">Contraseña</label>
                <input class="form-control" id="register-password" name="password" type="password" minlength="6" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="role">Rol</label>
                <select class="form-select" id="role" name="role">
                  <option value="user">Usuario</option>
                  <option value="admin">Administrador</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100">Crear usuario</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../js/pages/admin-dashboard.js"></script>
</body>
</html>
