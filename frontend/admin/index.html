<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel admin · Darts Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Darts Manager</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#admin-nav" aria-controls="admin-nav" aria-expanded="false" aria-label="Menú">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="admin-nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="players.html">Jugadores</a></li>
          <li class="nav-item"><a class="nav-link" href="tournaments.html">Torneos</a></li>
          <li class="nav-item"><a class="nav-link active" href="index.html">Usuarios</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3 py-2 py-lg-0">
          <div class="text-white small text-end">
            <div id="user-name" class="fw-semibold">...</div>
            <div id="user-role" class="opacity-75">Administrador</div>
          </div>
          <button type="button" class="btn btn-outline-light btn-sm" id="logout-btn">Salir</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
      <div>
        <h1 class="h4 mb-1">Usuarios</h1>
        <p class="text-muted mb-0">Gestiona cuentas de acceso al sistema.</p>
      </div>
      <button type="button" class="btn btn-outline-secondary btn-sm" id="refresh-users-btn">Actualizar</button>
    </div>

    <div id="users-alert" class="alert d-none" role="alert"></div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead class="table-light">
                <tr>
                  <th>Usuario</th>
                  <th>Rol</th>
                  <th>Alta</th>
                  <th class="text-end">Acciones</th>
                </tr>
              </thead>
              <tbody id="users-table-body">
                <tr><td colspan="4" class="text-center text-muted py-4">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
          <div class="card-footer bg-white">
            <span class="small text-muted" id="users-pagination-info">...</span>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h5 mb-3">Registrar usuario</h2>
            <div id="register-alert" class="alert d-none" role="alert"></div>
            <form id="register-form">
              <div class="mb-3">
                <label class="form-label" for="displayName">Nombre</label>
                <input class="form-control" id="displayName" name="displayName" type="text">
              </div>
              <div class="mb-3">
                <label class="form-label" for="register-email">Email</label>
                <input class="form-control" id="register-email" name="email" type="email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="register-password">Contraseña</label>
                <input class="form-control" id="register-password" name="password" type="password" minlength="6" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="role">Rol</label>
                <select class="form-select" id="role" name="role">
                  <option value="user">Usuario</option>
                  <option value="admin">Administrador</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100">Crear usuario</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="user-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="user-form">
          <div class="modal-header">
            <h2 class="modal-title h5">Editar usuario</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-user-id">
            <div class="mb-3">
              <label class="form-label" for="edit-user-email">Email</label>
              <input class="form-control" id="edit-user-email" type="email" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label" for="edit-user-display-name">Nombre</label>
              <input class="form-control" id="edit-user-display-name" type="text">
            </div>
            <div class="mb-3">
              <label class="form-label" for="edit-user-role">Rol</label>
              <select class="form-select" id="edit-user-role">
                <option value="user">Usuario</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="save-user-btn">Guardar cambios</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/pages/admin-dashboard.js"></script>
</body>
</html>
